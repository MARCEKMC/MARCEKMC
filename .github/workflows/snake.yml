name: Generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MARCEKMC
          outputs: |
            dist/github-snake.svg?color_snake=%23111111&color_dots=%23ebebeb,%23c2c2c2,%23919191,%23595959,%23212121
            dist/github-snake-dark.svg?color_snake=%23ffffff&color_dots=%23212121,%23404040,%236e6e6e,%23a3a3a3,%23dbdbdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove progress bar from snake
        run: |
          for f in dist/github-snake.svg dist/github-snake-dark.svg; do
            sed -i -E 's|<rect class="u [^"]*"[^>]*/>||g' "$f"
            sed -i -E 's|(viewBox="-16 -32 [0-9.]+ )192"|\1160"|' "$f"
            sed -i -E 's|height="192"|height="160"|' "$f"
          done

      - name: Generate stats and languages cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'EOF'
          import base64, json, os, urllib.request

          USER = "MARCEKMC"
          TOKEN = os.environ.get("GITHUB_TOKEN", "")

          def get(url, auth=False):
              headers = {"User-Agent": "Mozilla/5.0"}
              if auth and TOKEN:
                  headers["Authorization"] = f"Bearer {TOKEN}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return r.read()

          FONT_B64 = base64.b64encode(
              get("https://fonts.gstatic.com/s/pressstart2p/v16/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2")
          ).decode()
          FONT = ("@font-face{font-family:'PS2P';src:url(data:font/woff2;base64,"
                  + FONT_B64 + ") format('woff2');}")

          user = json.loads(get(f"https://api.github.com/users/{USER}", auth=True))
          repos = json.loads(get(f"https://api.github.com/users/{USER}/repos?per_page=100", auth=True))
          contrib = json.loads(get(f"https://github-contributions-api.jogruber.de/v4/{USER}?y=last"))

          total_contrib = sum(d["count"] for d in contrib["contributions"])
          stars = sum(r["stargazers_count"] for r in repos)
          langs = {}
          for r in repos:
              if r.get("language"):
                  langs[r["language"]] = langs.get(r["language"], 0) + 1

          W, H = 470, 200
          FRAME = (f'<rect x="0.5" y="0.5" width="{W-1}" height="{H-1}" rx="8" '
                   f'fill="#000000" stroke="#2a2a2a"/>')
          STYLE = (f'<style>{FONT}'
                   ".t{font-family:'PS2P',monospace;font-size:13px;fill:#ffffff;}"
                   ".l{font-family:'PS2P',monospace;font-size:9px;fill:#c9c9c9;}"
                   ".v{font-family:'PS2P',monospace;font-size:9px;fill:#ffffff;text-anchor:end;}"
                   "</style>")

          rows = [
              ("CONTRIBUTIONS (YEAR)", f"{total_contrib:,}"),
              ("STARS EARNED",         str(stars)),
              ("PUBLIC REPOS",         str(user["public_repos"])),
              ("FOLLOWERS",            str(user["followers"])),
          ]
          parts = [FRAME, STYLE, '<text class="t" x="24" y="40">GITHUB STATS</text>']
          y = 78
          for label, value in rows:
              parts.append(f'<rect x="24" y="{y-8}" width="8" height="8" fill="#ffffff"/>')
              parts.append(f'<text class="l" x="42" y="{y}">{label}</text>')
              parts.append(f'<text class="v" x="{W-24}" y="{y}">{value}</text>')
              y += 30
          svg_stats = (f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}" '
                       f'width="{W}" height="{H}" role="img" aria-label="github stats">'
                       + "".join(parts) + "</svg>")

          shades = ["#ffffff", "#c9c9c9", "#9a9a9a", "#6e6e6e", "#4a4a4a"]
          top = sorted(langs.items(), key=lambda kv: -kv[1])[:5]
          total = sum(n for _, n in langs.items()) or 1
          parts = [FRAME, STYLE, '<text class="t" x="24" y="40">TOP LANGUAGES BY REPO</text>']
          y = 74
          BAR_X, BAR_W = 170, 210
          for i, (name, n) in enumerate(top):
              pct = n / total
              parts.append(f'<text class="l" x="24" y="{y}">{name.upper()[:12]}</text>')
              parts.append(f'<rect x="{BAR_X}" y="{y-8}" width="{BAR_W}" height="9" fill="#1c1c1c"/>')
              parts.append(f'<rect x="{BAR_X}" y="{y-8}" width="{max(4, BAR_W*pct):.0f}" height="9" fill="{shades[i]}"/>')
              parts.append(f'<text class="v" x="{W-24}" y="{y}">{pct*100:.0f}%</text>')
              y += 26
          svg_langs = (f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}" '
                       f'width="{W}" height="{H}" role="img" aria-label="top languages by repo">'
                       + "".join(parts) + "</svg>")

          with open("dist/card-stats.svg", "w") as f:
              f.write(svg_stats)
          with open("dist/card-langs.svg", "w") as f:
              f.write(svg_langs)
          EOF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
