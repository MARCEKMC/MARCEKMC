name: Generate contribution snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MARCEKMC
          outputs: |
            dist/github-snake.svg?color_snake=%23111111&color_dots=%23ebebeb,%23c2c2c2,%23919191,%23595959,%23212121
            dist/github-snake-dark.svg?color_snake=%23ffffff&color_dots=%23212121,%23404040,%236e6e6e,%23a3a3a3,%23dbdbdb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove progress bar from snake
        run: |
          for f in dist/github-snake.svg dist/github-snake-dark.svg; do
            sed -i -E 's|<rect class="u [^"]*"[^>]*/>||g' "$f"
            sed -i -E 's|(viewBox="-16 -32 [0-9.]+ )192"|\1160"|' "$f"
            sed -i -E 's|height="192"|height="160"|' "$f"
          done

      - name: Generate contribution calendar
        run: |
          python3 <<'EOF'
          import json, urllib.request, datetime
          USER = "MARCEKMC"
          url = f"https://github-contributions-api.jogruber.de/v4/{USER}?y=last"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.loads(r.read().decode())
          days = sorted(data["contributions"], key=lambda d: d["date"])
          RAMPS = {
              "dark":  ["#1b1f24", "#3d3d3d", "#6e6e6e", "#a3a3a3", "#ffffff"],
              "light": ["#ebedf0", "#c6c6c6", "#8f8f8f", "#555555", "#111111"],
          }
          CELL, GAP, PAD = 11, 3, 4
          PITCH = CELL + GAP
          first = datetime.date.fromisoformat(days[0]["date"])
          lead = first.isoweekday() % 7
          cells = [(*divmod(i + lead, 7), d["level"]) for i, d in enumerate(days)]
          weeks = cells[-1][0] + 1
          W = PAD * 2 + weeks * PITCH - GAP
          H = PAD * 2 + 7 * PITCH - GAP
          for theme, ramp in RAMPS.items():
              rects = [
                  f'<rect x="{PAD + w * PITCH}" y="{PAD + d * PITCH}" width="{CELL}" height="{CELL}" rx="2" fill="{ramp[lv]}"/>'
                  for w, d, lv in cells
              ]
              svg = (
                  f'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {W} {H}" width="{W}" height="{H}" '
                  f'role="img" aria-label="contribution calendar">\n' + "\n".join(rects) + "\n</svg>"
              )
              with open(f"dist/calendar-{theme}.svg", "w") as f:
                  f.write(svg)
          EOF

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
